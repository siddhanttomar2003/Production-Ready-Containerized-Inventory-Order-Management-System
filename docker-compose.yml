services:
  backend:
    build:
      context: ./backend
    container_name: ethara-backend
    environment:
      FLASK_ENV: development
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ethara
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ethara-postgres
    environment:
      POSTGRES_DB: ethara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ethara"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: